services:

  mysql:
    image: mysql:8.4

    container_name: employee-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: krishna
      MYSQL_USER: employee_user
      MYSQL_PASSWORD: Emp@12345

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  app:
    build: .

    container_name: employee-app

    restart: always

    depends_on:
      - mysql

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_USER: employee_user
      DB_PASSWORD: Emp@12345
      DB_NAME: krishna
      DB_PORT: 3306

volumes:
  mysql-data:
