<!DOCTYPE html>
<html>

<head>

    <title>Employee Management----- System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Employee Management System</h1>

    <!-- Employee Form -->

    <form id="employeeForm">

        <!-- Hidden ID (used when editing) -->
        <input type="hidden" id="employeeId">

        <!-- Employee Name -->
        <label>Name</label><br>
        <input type="text" id="name" placeholder="Enter Employee Name" required>
        <br><br>

        <!-- Employee Email -->
        <label>Email</label><br>
        <input type="email" id="email" placeholder="Enter Employee Email" required>
        <br><br>

        <!-- Department -->
        <label>Department</label><br>
        <input type="text" id="department" placeholder="Enter Department" required>
        <br><br>

        <!-- Salary -->
        <label>Salary</label><br>
        <input type="number" id="salary" placeholder="Enter Salary" required>
        <br><br>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn">
            Add Employee
        </button>

    </form>

    <hr>

    <!-- Search Box -->

    <h3>Search Employee</h3>

    <input
        type="text"
        id="search"
        placeholder="Search by Name, Email or Department">

    <br><br>

    <!-- Employee Table -->

    <table border="1" cellpadding="10">

        <thead>

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Department</th>

                <th>Salary</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody id="employeeTable">

            <!-- JavaScript will add employee rows here -->

        </tbody>

    </table>

    <!-- JavaScript File -->

    <script src="script.js"></script>

</body>

</html>
